input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [message] =~ /(?i)password/ {
    mutate {
      gsub => ["message", "(?i)(password[\":\\s]*)([^\",\\s}]+)", "\1***MASKED***"]
    }
  }

  if [message] =~ /account.*\d{10,}/ {
    mutate {
      gsub => ["message", "(\d{4})\d{6,}(\d{4})", "\1******\2"]
    }
  }

  mutate {
    remove_field => ["@version", "port"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "bank-logs-%{+YYYY.MM.dd}"
  }
}
