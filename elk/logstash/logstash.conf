input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["bank-logs"]
    group_id => "logstash-bank-logs"
    codec => json
    decorate_events => "none"
  }
}

filter {
  if [message] =~ /(?i)password/ {
    mutate {
      gsub => ["message", "(?i)(password[\":\\s]*)([^\",\\s}]+)", "\1***MASKED***"]
    }
  }

  if [message] =~ /account.*\d{10,}/ {
    mutate {
      gsub => ["message", "(\d{4})\d{6,}(\d{4})", "\1******\2"]
    }
  }

  mutate {
    remove_field => ["@version"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "bank-logs-%{+YYYY.MM.dd}"
  }
}
