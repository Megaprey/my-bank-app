server:
  port: 9000
  servlet:
    session:
      cookie:
        name: AUTHSESSIONID

spring:
  application:
    name: auth-server

auth:
  issuer-uri: ${AUTH_ISSUER_URI:http://localhost:9000}
  front-ui-redirect-uri: ${FRONT_UI_REDIRECT_URI:http://localhost:8080/login/oauth2/code/front-ui-client}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: ${LOG_LEVEL:WARN}
    com.bank: ${LOG_LEVEL:INFO}
