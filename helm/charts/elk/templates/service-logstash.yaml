apiVersion: v1
kind: Service
metadata:
  name: {{ include "elk.fullname" . }}-logstash
  labels:
    {{- include "elk.labels" . | nindent 4 }}
    app.kubernetes.io/component: logstash
spec:
  type: ExternalName
  externalName: {{ .Values.logstash.externalHost }}
  ports:
    - port: {{ .Values.logstash.port }}
      targetPort: {{ .Values.logstash.port }}
      protocol: TCP
      name: tcp
